  <rect x="34" y="446.5" width="56" height="4.5" rx="2" fill="url(#g5h)"/>

  <!-- 7d progress bar (SVG rect): 29% of 72px = 21px filled -->
  <rect x="34" y="466.5" width="72" height="4.5" rx="2" fill="#2d2d2d"/>
  <rect x="34" y="466.5" width="21" height="4.5" rx="2" fill="url(#g7d)"/>

