<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520">
  <defs>
    <style>
      .mono { font-family: 'SF Mono','Fira Code','Cascadia Code','Menlo','Consolas',monospace; }
    </style>
    <!-- 5h bar gradient: green → yellow → red -->
    <linearGradient id="g5h" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#3be623"/>
      <stop offset="25%" stop-color="#9de623"/>
      <stop offset="50%" stop-color="#e6ce23"/>
      <stop offset="75%" stop-color="#e69d23"/>
      <stop offset="100%" stop-color="#e63b23"/>
    </linearGradient>
    <!-- 7d bar gradient: green only -->
    <linearGradient id="g7d" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#3be623"/>
      <stop offset="100%" stop-color="#9de623"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="920" height="520" rx="10" fill="#010409"/>
  <!-- Title bar -->
  <rect width="920" height="38" rx="10" fill="#161b22"/>
  <rect y="30" width="920" height="8" fill="#161b22"/>
  <line x1="0" y1="38" x2="920" y2="38" stroke="#30363d" stroke-width="0.5"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="460" y="24" text-anchor="middle" fill="#7d8590" class="mono" font-size="12">claude — ~/myproject</text>

  <!-- ═══ Terminal content area ═══ -->

  <!-- User prompt -->
  <text y="68" class="mono" font-size="13">
    <tspan x="20" fill="#7d8590">╭─────────────────────────────────────────────────────────────────────────────────╮</tspan>
  </text>
  <text y="88" class="mono" font-size="13">
    <tspan x="20" fill="#7d8590">│</tspan>
    <tspan fill="#c9d1d9"> </tspan>
    <tspan fill="#f0883e" font-weight="700">&gt;</tspan>
    <tspan fill="#c9d1d9"> Add rate limiting middleware to the API gateway with Redis backing store</tspan>
    <tspan fill="#7d8590" dx="18">│</tspan>
  </text>
  <text y="108" class="mono" font-size="13">
    <tspan x="20" fill="#7d8590">╰─────────────────────────────────────────────────────────────────────────────────╯</tspan>
  </text>

  <!-- Claude response -->
  <text y="140" class="mono" font-size="13">
    <tspan x="20" fill="#d2a8ff">⏵</tspan>
    <tspan fill="#c9d1d9"> I'll implement rate limiting with Redis. Let me start by creating the middleware.</tspan>
  </text>

  <!-- File operation -->
  <text y="170" class="mono" font-size="13">
    <tspan x="36" fill="#58a6ff">Edit</tspan>
    <tspan fill="#7d8590"> src/middleware/rate-limiter.ts</tspan>
  </text>

  <!-- Code block -->
  <rect x="30" y="185" width="860" height="180" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>

  <text y="206" class="mono" font-size="12">
    <tspan x="45" fill="#7d8590"> 1</tspan>
    <tspan fill="#ff7b72"> import</tspan>
    <tspan fill="#c9d1d9"> { Redis } </tspan>
    <tspan fill="#ff7b72">from</tspan>
    <tspan fill="#a5d6ff"> 'ioredis'</tspan>
    <tspan fill="#c9d1d9">;</tspan>
  </text>
  <text y="224" class="mono" font-size="12">
    <tspan x="45" fill="#7d8590"> 2</tspan>
    <tspan fill="#ff7b72"> import</tspan>
    <tspan fill="#c9d1d9"> { RateLimiterRedis } </tspan>
    <tspan fill="#ff7b72">from</tspan>
    <tspan fill="#a5d6ff"> 'rate-limiter-flexible'</tspan>
    <tspan fill="#c9d1d9">;</tspan>
  </text>
  <text y="242" class="mono" font-size="12">
    <tspan x="45" fill="#7d8590"> 3</tspan>
  </text>
  <text y="260" class="mono" font-size="12">
    <tspan x="45" fill="#7d8590"> 4</tspan>
    <tspan fill="#ff7b72"> export</tspan>
    <tspan fill="#ff7b72"> const</tspan>
    <tspan fill="#d2a8ff"> rateLimiter</tspan>
    <tspan fill="#c9d1d9"> = </tspan>
    <tspan fill="#ff7b72">new</tspan>
    <tspan fill="#79c0ff"> RateLimiterRedis</tspan>
    <tspan fill="#c9d1d9">({</tspan>
  </text>
  <text y="278" class="mono" font-size="12">
    <tspan x="45" fill="#7d8590"> 5</tspan>
    <tspan fill="#c9d1d9">   storeClient: </tspan>
    <tspan fill="#ff7b72">new</tspan>
    <tspan fill="#79c0ff"> Redis</tspan>
    <tspan fill="#c9d1d9">({ host: </tspan>
    <tspan fill="#a5d6ff">'localhost'</tspan>
    <tspan fill="#c9d1d9">, port: </tspan>
    <tspan fill="#79c0ff">6379</tspan>
    <tspan fill="#c9d1d9"> }),</tspan>
  </text>
  <text y="296" class="mono" font-size="12">
    <tspan x="45" fill="#7d8590"> 6</tspan>
    <tspan fill="#c9d1d9">   points: </tspan>
    <tspan fill="#79c0ff">100</tspan>
    <tspan fill="#c9d1d9">,</tspan>
    <tspan fill="#7d8590">       // requests per window</tspan>
  </text>
  <text y="314" class="mono" font-size="12">
    <tspan x="45" fill="#7d8590"> 7</tspan>
    <tspan fill="#c9d1d9">   duration: </tspan>
    <tspan fill="#79c0ff">60</tspan>
    <tspan fill="#c9d1d9">,</tspan>
    <tspan fill="#7d8590">       // seconds</tspan>
  </text>
  <text y="332" class="mono" font-size="12">
    <tspan x="45" fill="#7d8590"> 8</tspan>
    <tspan fill="#c9d1d9">   blockDuration: </tspan>
    <tspan fill="#79c0ff">300</tspan>
    <tspan fill="#c9d1d9">,</tspan>
    <tspan fill="#7d8590">  // block for 5 min</tspan>
  </text>
  <text y="350" class="mono" font-size="12">
    <tspan x="45" fill="#7d8590"> 9</tspan>
    <tspan fill="#c9d1d9"> });</tspan>
  </text>

  <!-- Activity indicator -->
  <text y="392" class="mono" font-size="13">
    <tspan x="20" fill="#3fb950">✓</tspan>
    <tspan fill="#7d8590"> Created rate-limiter.ts </tspan>
    <tspan fill="#3fb950">+47</tspan>
    <tspan fill="#7d8590"> lines</tspan>
  </text>
  <text y="412" class="mono" font-size="13">
    <tspan x="20" fill="#d2a8ff">⏵</tspan>
    <tspan fill="#c9d1d9"> Now adding the middleware to the Express app and writing tests...</tspan>
  </text>

  <!-- ═══ Separator line ═══ -->
  <line x1="0" y1="432" x2="920" y2="432" stroke="#21262d" stroke-width="0.5"/>

  <!-- ═══ ccbar Row 1: 5h │ today │ week │ month ═══ -->
  <!-- Col 1: 5h bar -->
  <text y="450" xml:space="preserve" class="mono" font-size="11" font-weight="bold"><tspan x="16" fill="#466eb4">5h</tspan><tspan fill="#c8d2e6"> </tspan><tspan fill="#3be623">━</tspan><tspan fill="#5ce623">━</tspan><tspan fill="#7de623">━</tspan><tspan fill="#9de623">━</tspan><tspan fill="#bee623">━</tspan><tspan fill="#d8e623">━</tspan><tspan fill="#2d2d2d">────</tspan><tspan fill="#e6a023"> 65%</tspan><tspan fill="#aa96e6"> 1h42m</tspan></text>
  <!-- Sep 1 + Col 2: today -->
  <text y="450" xml:space="preserve" class="mono" font-size="11" font-weight="bold"><tspan x="220" fill="#3c3c46">│ </tspan><tspan fill="#4178af">today</tspan><tspan fill="#c8d2e6"> 1.8M</tspan><tspan fill="#ffd23c"> $42</tspan><tspan fill="#78788c"> ›</tspan><tspan fill="#ff8c50"> proj</tspan><tspan fill="#c8d2e6"> 480k</tspan><tspan fill="#aa916e"> ♻</tspan><tspan fill="#c8aa64">8M</tspan><tspan fill="#aa916e">/94%</tspan><tspan fill="#ffd23c"> $18</tspan></text>
  <!-- Sep 2 + Col 3: week -->
  <text y="450" xml:space="preserve" class="mono" font-size="11" font-weight="bold"><tspan x="500" fill="#3c3c46">│ </tspan><tspan fill="#4b73a5">week</tspan><tspan fill="#ffd23c"> $180</tspan><tspan fill="#78788c"> ›</tspan><tspan fill="#ff8c50"> proj</tspan><tspan fill="#c8d2e6"> 1.2M</tspan><tspan fill="#ffd23c"> $86</tspan></text>
  <!-- Sep 3 + Col 4: month -->
  <text y="450" xml:space="preserve" class="mono" font-size="11" font-weight="bold"><tspan x="690" fill="#3c3c46">│ </tspan><tspan fill="#5564a0">month</tspan><tspan fill="#c8d2e6"> 4.2M</tspan><tspan fill="#ffd23c"> $210</tspan><tspan fill="#78788c"> ›</tspan><tspan fill="#ff8c50"> proj</tspan><tspan fill="#ffd23c"> $96</tspan></text>

  <!-- ═══ ccbar Row 2: 7d │ sess │ total ═══ -->
  <!-- Col 1: 7d bar -->
  <text y="472" xml:space="preserve" class="mono" font-size="11" font-weight="bold"><tspan x="16" fill="#466eb4">7d</tspan><tspan fill="#c8d2e6"> </tspan><tspan fill="#3be623">━</tspan><tspan fill="#6ce623">━</tspan><tspan fill="#2d2d2d">────────</tspan><tspan fill="#43e623"> 25%</tspan><tspan fill="#aa96e6">  5d8h</tspan></text>
  <!-- Sep 1 + Col 2: sess -->
  <text y="472" xml:space="preserve" class="mono" font-size="11" font-weight="bold"><tspan x="220" fill="#3c3c46">│ </tspan><tspan fill="#5069aa">sess</tspan><tspan fill="#ffd23c"> $8.50</tspan><tspan fill="#ffbe32"> $4/h</tspan><tspan fill="#f0b432"> →$12</tspan><tspan fill="#b49bdc"> 2h0m</tspan><tspan fill="#db8d56"> 42%</tspan><tspan fill="#50d264"> +320</tspan><tspan fill="#78788c">/</tspan><tspan fill="#dc5a5a">-85</tspan></text>
  <!-- Sep 2 + Col 3: total -->
  <text y="472" xml:space="preserve" class="mono" font-size="11" font-weight="bold"><tspan x="500" fill="#3c3c46">│ </tspan><tspan fill="#6e9bc8">total</tspan><tspan fill="#ffd23c"> $210</tspan><tspan fill="#78788c"> ›</tspan><tspan fill="#ff8c50"> proj</tspan><tspan fill="#c8d2e6"> 1.8M</tspan><tspan fill="#aa916e"> ♻</tspan><tspan fill="#c8aa64">32M</tspan><tspan fill="#ffd23c"> $96</tspan><tspan fill="#78788c"> ~/myproject</tspan></text>

  <!-- ═══ Row 3: Claude Code native status ═══ -->
  <rect y="496" width="920" height="24" fill="#0d1117"/>
  <rect y="510" width="920" height="10" rx="10" fill="#0d1117"/>
  <text y="513" class="mono" font-size="11">
    <tspan x="20" fill="#484f58">⏸</tspan>
    <tspan fill="#7d8590"> plan mode on (shift+tab to cycle)</tspan>
  </text>
</svg>
