    <tspan fill="#c8d2e6"> 2.2M</tspan>
    <tspan fill="#ffd23c"> $93.0</tspan>
    <tspan fill="#78788c"> ›</tspan>
    <tspan fill="#ff8c50"> proj</tspan>
    <tspan fill="#c8d2e6"> 1.1M</tspan>
    <tspan fill="#aa916e"> ♻</tspan>
