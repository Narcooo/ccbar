    <tspan fill="#ffd23c">  $132</tspan>
    <tspan fill="#ffbe32"> $3.61/h</tspan>
    <tspan fill="#b49bdc"> 1d12h</tspan>
    <tspan fill="#db8d56"> 66%</tspan>
    <tspan fill="#50d264">    +9096</tspan>
    <tspan fill="#78788c">/</tspan>
    <tspan fill="#dc5a5a">-2733</tspan>
  </text>

  <!-- Sep 2 -->
  <text y="456" class="mono" font-size="12.5"><tspan x="498" fill="#3c3c46">│</tspan></text>
  <text y="476" class="mono" font-size="12.5"><tspan x="498" fill="#3c3c46">│</tspan></text>

  <!-- Col 3: week / total -->
  <text y="456" class="mono" font-size="12.5" font-weight="bold">
    <tspan x="510" fill="#4b73a5">week</tspan>
    <tspan fill="#ffd23c">  $1.1k</tspan>
    <tspan fill="#78788c"> ›</tspan>
    <tspan fill="#ff8c50"> proj</tspan>
    <tspan fill="#c8d2e6"> 17.1M</tspan>
    <tspan fill="#ffd23c"> $741</tspan>
  </text>

  <text y="476" class="mono" font-size="12.5" font-weight="bold">
    <tspan x="510" fill="#6e9bc8">total</tspan>
    <tspan fill="#ffd23c"> $7.1k</tspan>
    <tspan fill="#78788c"> ›</tspan>
    <tspan fill="#ff8c50"> proj</tspan>
    <tspan fill="#c8d2e6"> 187M</tspan>
    <tspan fill="#aa916e"> ♻</tspan>
    <tspan fill="#c8aa64">1.5B</tspan>
    <tspan fill="#ffd23c"> $5.0k</tspan>
  </text>

  <!-- Sep 3 (row 1 only) -->
  <text y="456" class="mono" font-size="12.5"><tspan x="728" fill="#3c3c46">│</tspan></text>

  <!-- Col 4: month (row 1) / path (row 2) -->
  <text y="456" class="mono" font-size="12.5" font-weight="bold">
    <tspan x="740" fill="#5564a0">month</tspan>
    <tspan fill="#c8d2e6"> 24.4M</tspan>
    <tspan fill="#ffd23c"> $1.1k</tspan>
    <tspan fill="#78788c"> ›</tspan>
    <tspan fill="#ff8c50"> proj</tspan>
    <tspan fill="#ffd23c"> $758</tspan>
  </text>

  <text y="476" class="mono" font-size="12.5">
    <tspan x="740" fill="#78788c">.../PyProject/myproject</tspan>
  </text>

  <!-- ═══ Row 3: Claude Code native status ═══ -->
  <rect y="490" width="920" height="30" fill="#0d1117"/>
  <rect y="510" width="920" height="10" rx="10" fill="#0d1117"/>
  <text y="508" class="mono" font-size="11">
    <tspan x="20" fill="#484f58">⏸</tspan>
    <tspan fill="#7d8590"> plan mode on (shift+tab to cycle)</tspan>
